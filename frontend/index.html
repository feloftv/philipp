<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Extrae Videos de Youtube en TXT y PDF - Philipp">
    <meta name="theme-color" content="#1a472a">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%231a472a'>P</text></svg>">
    <title>Philipp - Extrae Videos de Youtube en TXT y PDF</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div id="versionInfo" style="position: absolute; top: 10px; right: 10px; background: #d4af37; color: #1a472a; padding: 8px 12px; border-radius: 6px; font-weight: bold; min-width: 120px; text-align: right;">cargando...</div>
            <h1>Philipp</h1>
            <p>Extrae Videos de Youtube en TXT y PDF</p>
            <div class="accent-line"></div>
        </header>

        <div class="panel">
            <h2>📥 Cargar y Descargar</h2>
            
            <div class="form-group">
                <label for="youtubeUrl">URL de YouTube:</label>
                <input type="text" id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=...">
            </div>

            <div class="status" id="status1"></div>

            <button class="btn-primary" onclick="downloadSubtitles()" id="downloadBtn">
                📥 Descargar Subtítulos
            </button>

            <div class="hidden" id="downloadReady">
                <div class="subtitle-preview">
                    <strong>✓ Subtítulos Descargados:</strong>
                    <div id="previewContent" style="margin-top: 10px;"></div>
                </div>
                <div class="char-count">
                    <strong id="charCount">0</strong> caracteres
                </div>

                <div class="button-group">
                    <button class="btn-secondary" onclick="promptSaveLocation('txt')">💾 TXT</button>
                    <button class="btn-secondary" onclick="promptSaveLocation('pdf')">🎯 PDF</button>
                </div>
            </div>
        </div>

        <footer>
            <p>Philipp © 2026 | Extrae subtítulos de YouTube fácilmente</p>
        </footer>
    </div>

    <div class="theme-toggle-container">
        <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema">
            <span id="themeIcon">🌙</span>
        </button>
    </div>

    <div id="saveModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">💾 Guardar Archivo</h2>
            <input type="text" id="fileName" class="modal-input" placeholder="Nombre del archivo (sin extensión)">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeSaveModal()">Cancelar</button>
                <button class="btn-primary" onclick="saveFile()">Guardar</button>
            </div>
        </div>
    </div>

    <script src="js/theme.js"></script>
    <script src="js/version.js"></script>
    <script src="js/subtitles.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
