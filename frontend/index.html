<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Extrae Videos de Youtube en TXT y PDF - Philipp">
    <meta name="theme-color" content="#1a472a">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' fill='%231a472a'>P</text></svg>">
    <title>Philipp - Extrae Videos de Youtube en TXT y PDF</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1a472a;
            --accent: #d4af37;
            --light: #f5f3f0;
            --dark: #1a1a1a;
            --border: #e0dbd5;
            --success: #2d5a3d;
            --text: #2c2c2c;
            --bg: #f5f3f0;
            --bg-secondary: #ffffff;
        }

        html.dark-mode {
            --primary: #e8f1ed;
            --accent: #d4af37;
            --light: #1a1a1a;
            --dark: #f5f3f0;
            --border: #333333;
            --text: #e0e0e0;
            --bg: #0d0d0d;
            --bg-secondary: #1a1a1a;
        }

        body {
            font-family: 'Georgia', 'Garamond', serif;
            background: linear-gradient(135deg, var(--bg) 0%, #ede7e1 100%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
            transition: background 0.5s ease, color 0.5s ease;
        }

        html.dark-mode body {
            background: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 100%);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: slideDown 0.8s ease-out;
        }

        header h1 {
            font-size: 4em;
            color: var(--primary);
            margin-bottom: 5px;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        header p {
            color: #555;
            font-size: 1.15em;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        html.dark-mode header p {
            color: #aaa;
        }

        .accent-line {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), transparent);
            margin: 20px auto;
        }

        .panel {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
            animation: fadeInUp 0.8s ease-out;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        html.dark-mode .panel {
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .panel h2 {
            color: var(--primary);
            margin-bottom: 25px;
            font-size: 1.5em;
            font-weight: 400;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 12px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--primary);
            font-weight: 500;
            font-size: 1em;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: 'Georgia', serif;
            font-size: 1em;
            color: var(--text);
            background: var(--bg-secondary);
            transition: all 0.3s ease;
        }

        html.dark-mode input[type="text"] {
            background: #262626;
            border-color: #404040;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        button {
            padding: 14px 28px;
            border: none;
            border-radius: 6px;
            font-family: 'Georgia', serif;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            width: 100%;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--bg-secondary);
        }

        .btn-primary:hover {
            background: #0f3820;
            box-shadow: 0 6px 16px rgba(26, 71, 42, 0.25);
            transform: translateY(-2px);
        }

        html.dark-mode .btn-primary {
            background: #2d5a3d;
            color: #e8f1ed;
        }

        html.dark-mode .btn-primary:hover {
            background: #3a6f4a;
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #e8f1ed;
            color: var(--primary);
            border: 1px solid #d0dcd7;
            font-weight: 600;
        }

        html.dark-mode .btn-secondary {
            background: #2d5a3d;
            color: #e8f1ed;
            border-color: #3a6f4a;
        }

        .btn-secondary:hover {
            background: #d8e5e0;
            box-shadow: 0 4px 12px rgba(26, 71, 42, 0.15);
            transform: translateY(-2px);
        }

        html.dark-mode .btn-secondary:hover {
            background: #3a6f4a;
        }

        .status {
            padding: 14px 16px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 0.95em;
            display: none;
            animation: slideIn 0.4s ease-out;
        }

        .status.show {
            display: block;
        }

        .status.loading {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #1976d2;
        }

        html.dark-mode .status.loading {
            background: #1e3a5f;
            color: #64b5f6;
        }

        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #388e3c;
        }

        html.dark-mode .status.success {
            background: #1b5e20;
            color: #81c784;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #d32f2f;
        }

        html.dark-mode .status.error {
            background: #5f1f1f;
            color: #ef5350;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(25, 118, 210, 0.3);
            border-top-color: #1976d2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .subtitle-preview {
            background: #fafafa;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            padding: 16px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            color: #666;
            line-height: 1.5;
        }

        html.dark-mode .subtitle-preview {
            background: #262626;
            border-color: #404040;
            color: #aaa;
        }

        .char-count {
            font-size: 0.85em;
            color: #999;
            margin-top: 8px;
        }

        html.dark-mode .char-count {
            color: #666;
        }

        .hidden {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .button-group button {
            flex: 1;
            margin-bottom: 0;
        }

        /* Theme Toggle Switch */
        .theme-toggle-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 999;
            animation: fadeIn 0.6s ease-out 0.3s backwards;
        }

        .theme-toggle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            border: none;
            cursor: pointer;
            font-size: 1.5em;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(26, 71, 42, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(20deg);
            box-shadow: 0 8px 24px rgba(26, 71, 42, 0.4);
        }

        .theme-toggle:active {
            transform: scale(0.95);
        }

        html.dark-mode .theme-toggle {
            background: #2d5a3d;
            box-shadow: 0 4px 16px rgba(212, 175, 55, 0.2);
        }

        html.dark-mode .theme-toggle:hover {
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.3);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s ease-out;
        }

        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: var(--bg-secondary);
            padding: 40px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        html.dark-mode .modal-content {
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
        }

        .modal-content h2 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.4em;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .modal-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 20px;
            font-family: 'Georgia', serif;
            font-size: 1em;
            background: var(--bg-secondary);
            color: var(--text);
        }

        html.dark-mode .modal-input {
            background: #262626;
            border-color: #404040;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
        }

        .modal-buttons button {
            flex: 1;
            padding: 12px;
            margin-bottom: 0;
        }

        .btn-cancel {
            background: #f5f5f5;
            color: #666;
            border: 1px solid #ddd;
        }

        html.dark-mode .btn-cancel {
            background: #262626;
            color: #aaa;
            border-color: #404040;
        }

        .btn-cancel:hover {
            background: #efefef;
            border-color: #999;
        }

        html.dark-mode .btn-cancel:hover {
            background: #333333;
            border-color: #666;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            color: #999;
            font-size: 0.9em;
            transition: color 0.3s ease;
        }

        html.dark-mode footer {
            color: #666;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5em;
            }

            .panel {
                padding: 25px;
            }

            .theme-toggle-container {
                bottom: 20px;
                right: 20px;
            }

            .theme-toggle {
                width: 50px;
                height: 50px;
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Philipp</h1>
            <p>Extrae Videos de Youtube en TXT y PDF</p>
            <div class="accent-line"></div>
        </header>

        <div class="panel">
            <h2>📥 Cargar y Descargar</h2>
            
            <div class="form-group">
                <label for="youtubeUrl">URL de YouTube:</label>
                <input 
                    type="text" 
                    id="youtubeUrl" 
                    placeholder="https://www.youtube.com/watch?v=..."
                >
            </div>

            <div class="status" id="status1"></div>

            <button class="btn-primary" onclick="downloadSubtitles()" id="downloadBtn">
                📥 Descargar Subtítulos
            </button>

            <div class="hidden" id="downloadReady">
                <div class="subtitle-preview">
                    <strong>✓ Subtítulos Descargados:</strong>
                    <div id="previewContent" style="margin-top: 10px;"></div>
                </div>
                <div class="char-count">
                    <strong id="charCount">0</strong> caracteres
                </div>

                <div class="button-group">
                    <button class="btn-secondary" onclick="promptSaveLocation('txt')">
                        💾 TXT
                    </button>
                    <button class="btn-secondary" onclick="promptSaveLocation('pdf')">
                        🎯 PDF
                    </button>
                </div>
            </div>
        </div>

        <footer>
            <p>Philipp © 2026 | Extrae subtítulos de YouTube fácilmente</p>
        </footer>
    </div>

    <!-- Theme Toggle Button -->
    <div class="theme-toggle-container">
        <button class="theme-toggle" onclick="toggleTheme()" title="Cambiar tema" aria-label="Cambiar tema claro/oscuro">
            <span id="themeIcon">🌙</span>
        </button>
    </div>

    <!-- Modal para guardar archivo -->
    <div id="saveModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">💾 Guardar Archivo</h2>
            <p id="modalDesc">¿Dónde deseas guardar el archivo?</p>
            
            <input 
                type="text" 
                id="fileName" 
                class="modal-input" 
                placeholder="Nombre del archivo (sin extensión)"
            >

            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeSaveModal()">Cancelar</button>
                <button class="btn-primary" onclick="saveFile()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        let subtitlesText = '';
        let videoTitle = '';
        let saveFormat = '';

        // Cargar tema guardado
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode');
                document.getElementById('themeIcon').textContent = '☀️';
            }
        });

        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            
            if (html.classList.contains('dark-mode')) {
                html.classList.remove('dark-mode');
                icon.textContent = '🌙';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark-mode');
                icon.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
            }
        }

        async function downloadSubtitles() {
            const url = document.getElementById('youtubeUrl').value.trim();

            if (!url) {
                showStatus('status1', 'Por favor ingresa una URL de YouTube', 'error');
                return;
            }

            showStatus('status1', 'Descargando subtítulos...');
            document.getElementById('downloadBtn').disabled = true;

            try {
                const response = await fetch('/api/subtitles/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: url })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || data.error || 'Error desconocido');
                }

                subtitlesText = data.data.subtitles;
                videoTitle = data.data.title;

                document.getElementById('downloadReady').classList.remove('hidden');
                document.getElementById('previewContent').textContent = subtitlesText.substring(0, 300) + '...';
                document.getElementById('charCount').textContent = subtitlesText.length.toLocaleString();

                showStatus('status1', '✓ Subtítulos descargados correctamente', 'success');

            } catch (error) {
                showStatus('status1', `Error: ${error.message}`, 'error');
            } finally {
                document.getElementById('downloadBtn').disabled = false;
            }
        }

        function promptSaveLocation(format) {
            if (!subtitlesText) {
                showStatus('status1', 'Descarga los subtítulos primero', 'error');
                return;
            }

            saveFormat = format;
            const defaultName = videoTitle.replace(/[^a-zA-Z0-9áéíóú\s]/g, '').substring(0, 50).trim();
            document.getElementById('fileName').value = defaultName;
            
            if (format === 'txt') {
                document.getElementById('modalTitle').textContent = '💾 Guardar como TXT';
            } else {
                document.getElementById('modalTitle').textContent = '🎯 Guardar como PDF';
            }
            
            document.getElementById('saveModal').classList.add('show');
        }

        function closeSaveModal() {
            document.getElementById('saveModal').classList.remove('show');
        }

        async function saveFile() {
            let fileName = document.getElementById('fileName').value.trim();

            if (!fileName) {
                fileName = 'subtitulos';
            }

            if (saveFormat === 'txt') {
                saveAsTXT(fileName);
            } else if (saveFormat === 'pdf') {
                await saveAsPDF(fileName);
            }
        }

        function saveAsTXT(fileName) {
            if (!fileName.endsWith('.txt')) {
                fileName += '.txt';
            }

            const blob = new Blob([subtitlesText], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a'); 
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', fileName);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            closeSaveModal();
            showStatus('status1', `✓ Archivo guardado: ${fileName}`, 'success');
        }

        async function saveAsPDF(fileName) {
            if (!fileName.endsWith('.pdf')) {
                fileName += '.pdf';
            }

            showStatus('status1', 'Generando PDF...');

            try {
                const response = await fetch('/api/subtitles/generate-pdf', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        subtitles: subtitlesText,
                        title: videoTitle
                    })
                });

                if (!response.ok) {
                    throw new Error('Error generando PDF');
                }

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.setAttribute('href', url);
                link.setAttribute('download', fileName);
                link.style.visibility = 'hidden';
                
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                closeSaveModal();
                showStatus('status1', `✓ Archivo guardado: ${fileName}`, 'success');

            } catch (error) {
                showStatus('status1', `Error: ${error.message}`, 'error');
            }
        }

        function showStatus(id, msg, type = 'loading') {
            const el = document.getElementById(id);
            el.className = `status show ${type}`;
            if (type === 'loading') {
                el.innerHTML = `<span class="spinner"></span>${msg}`;
            } else {
                el.textContent = msg;
            }
        }

        window.onclick = function(event) {
            const modal = document.getElementById('saveModal');
            if (event.target === modal) {
                closeSaveModal();
            }
        }
    </script>
</body>
</html>
